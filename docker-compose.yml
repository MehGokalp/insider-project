services:
  app_product:
    build:
      context: .
    restart: on-failure
    ports:
      - "8081:8080"
    environment:
      ENV: "dev"
      PORT: 8080
      MYSQL_DSN: "user:password@tcp(app_mysql:3306)/messages?charset=utf8mb4&parseTime=True&loc=Local"
      REDIS_DSN: "redis://:@app_redis:6379"
      MESSAGE_PROVIDER_BASE_URL: "https://webhook.site"

  app_redis:
    image: redis:6.0-alpine
    restart: on-failure
    command: [ "redis-server", "--notify-keyspace-events", "Kx" ]
    expose:
      - "6379"
    ports:
      - "6379:6379"

  app_mysql:
    image: mysql:8.4
    restart: on-failure
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: messages
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
        - "3306:3306"
    volumes:
      - "mysqldbdata:/var/lib/mysql"

volumes:
  mysqldbdata: ~
